<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <linearGradient id="grad" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="gradStroke" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#38bdf8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Subtle border -->
  <rect width="64" height="64" rx="14" stroke="url(#gradStroke)" stroke-width="1.5" fill="none"/>

  <!-- Letter N — bold, gradient -->
  <text
    x="32"
    y="46"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="40"
    text-anchor="middle"
    fill="url(#grad)"
  >N</text>

  <!-- Small dot accent bottom-right -->
  <circle cx="50" cy="50" r="4" fill="url(#grad)" opacity="0.7"/>
</svg>
